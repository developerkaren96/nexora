apiVersion: apps/v1
kind: Deployment
metadata: { name: worker, namespace: nexora, labels: { app: worker } }
spec:
  replicas: 2
  selector: { matchLabels: { app: worker } }
  template:
    metadata: { labels: { app: worker } }
    spec:
      containers:
        - name: worker
          image: ghcr.io/nexora/api:latest
          # NEXORA: the same image runs the API and the worker; flag selects mode.
          command: ["node", "dist/main.js"]
          env:
            - { name: WORKER_MODE, value: "true" }
            - { name: PROVISION_CONCURRENCY, value: "10" }
          envFrom: [ { secretRef: { name: api-secrets } } ]
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits:   { cpu: "1000m", memory: "1Gi" }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: worker, namespace: nexora }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: worker }
  minReplicas: 2
  maxReplicas: 30
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 75 } }
