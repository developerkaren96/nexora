apiVersion: apps/v1
kind: Deployment
metadata: { name: api, namespace: nexora, labels: { app: api } }
spec:
  replicas: 3
  selector: { matchLabels: { app: api } }
  strategy:
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata: { labels: { app: api } }
    spec:
      containers:
        - name: api
          image: ghcr.io/nexora/api:latest
          ports: [ { containerPort: 4000, name: http } ]
          envFrom:
            - secretRef: { name: api-secrets }
          env:
            - { name: NODE_ENV, value: production }
            - { name: PORT, value: "4000" }
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits:   { cpu: "1000m", memory: "1Gi" }
          readinessProbe:
            httpGet: { path: /readyz, port: 4000 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 4000 }
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata: { name: api, namespace: nexora }
spec:
  selector: { app: api }
  ports: [ { name: http, port: 4000, targetPort: 4000 } ]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: api, namespace: nexora }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: api }
  minReplicas: 3
  maxReplicas: 50
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 65 } }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: api, namespace: nexora }
spec:
  minAvailable: 2
  selector: { matchLabels: { app: api } }
