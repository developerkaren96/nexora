# Example only. In production these come from External Secrets Operator
# pointing at AWS Secrets Manager / GCP Secret Manager.
apiVersion: v1
kind: Secret
metadata: { name: api-secrets, namespace: nexora }
type: Opaque
stringData:
  DATABASE_URL: "postgresql://nexora:CHANGE_ME@postgres:5432/nexora"
  REDIS_URL: "redis://redis:6379"
  JWT_ACCESS_SECRET: "CHANGE_ME_64_BYTES"
  JWT_REFRESH_SECRET: "CHANGE_ME_64_BYTES"
  ARGON_SECRET: "CHANGE_ME_PEPPER"
  STRIPE_SECRET_KEY: "sk_live_CHANGE_ME"
  STRIPE_WEBHOOK_SECRET: "whsec_CHANGE_ME"
  S3_ACCESS_KEY: "CHANGE_ME"
  S3_SECRET_KEY: "CHANGE_ME"
  S3_ENDPOINT: "https://s3.amazonaws.com"
  S3_BUCKET: "nexora-assets"
  ROOT_DOMAIN: "nexora.app"
---
apiVersion: v1
kind: Secret
metadata: { name: web-secrets, namespace: nexora }
type: Opaque
stringData:
  NEXT_PUBLIC_API_URL: "https://api.nexora.app"
  NEXT_PUBLIC_ROOT_DOMAIN: "nexora.app"
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_live_CHANGE_ME"
