# Edge router for Nexora. Terminates TLS, splits subdomains by purpose, and
# proxies tenant subdomains/custom domains to the web app.
worker_processes auto;
events { worker_connections 4096; }

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  server_tokens off;

  log_format json escape=json
    '{"time":"$time_iso8601","host":"$host","method":"$request_method",'
    '"path":"$uri","status":$status,"rt":$request_time,"ua":"$http_user_agent",'
    '"ip":"$remote_addr","ref":"$http_referer"}';
  access_log /var/log/nginx/access.log json;

  proxy_http_version 1.1;
  proxy_set_header   Host              $host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;
  proxy_set_header   Upgrade           $http_upgrade;
  proxy_set_header   Connection        "upgrade";

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  limit_req_zone $binary_remote_addr zone=ip:10m rate=20r/s;

  upstream web { server web:3000; }
  upstream api { server api:4000; }

  # Marketing + app + admin + tenant subdomains → Next.js (routed by middleware)
  server {
    listen 80 default_server;
    server_name _;
    limit_req zone=ip burst=40 nodelay;

    # API surface (api.nexora.app)
    location ~ ^/(v1|docs|healthz|readyz|metrics)/? { proxy_pass http://api; }

    location / {
      proxy_pass http://web;
    }
  }

  # Dedicated API host (api.nexora.app) — strict CORS handled inside Nest.
  server {
    listen 80;
    server_name api.nexora.app;
    location / { proxy_pass http://api; }
  }
}
