global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: nexora-api
    metrics_path: /metrics
    kubernetes_sd_configs:
      - role: pod
        namespaces: { names: [nexora] }
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: api
        action: keep
      - source_labels: [__meta_kubernetes_pod_container_port_number]
        regex: "4000"
        action: keep

  - job_name: nexora-web
    metrics_path: /metrics
    kubernetes_sd_configs:
      - role: pod
        namespaces: { names: [nexora] }
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: web
        action: keep

  - job_name: postgres
    static_configs: [ { targets: ["postgres-exporter:9187"] } ]

  - job_name: redis
    static_configs: [ { targets: ["redis-exporter:9121"] } ]

rule_files:
  - alerts.yml
