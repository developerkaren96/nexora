name: nexora_mobile
description: Nexora — auto-generated mobile app shell that fetches its branding/features at runtime.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.2
  go_router: ^14.2.7
  shared_preferences: ^2.3.2
  firebase_core: ^3.4.0       # NEXORA: optional, gate behind feature flag
  firebase_messaging: ^15.1.1  # push
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
