name: CI

on:
  pull_request:
  push: { branches: [main, develop] }

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ts:
    name: Node — lint / typecheck / test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: nexora, POSTGRES_PASSWORD: nexora, POSTGRES_DB: nexora }
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U nexora" --health-interval=5s --health-timeout=5s --health-retries=10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      DATABASE_URL: postgresql://nexora:nexora@localhost:5432/nexora?schema=public
      SHADOW_DATABASE_URL: postgresql://nexora:nexora@localhost:5432/nexora_shadow?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access
      JWT_REFRESH_SECRET: ci-refresh
      ARGON_SECRET: ci-pepper
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_ROOT_DOMAIN: nexora.app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: "20.x", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: psql "$DATABASE_URL" -c "CREATE DATABASE nexora_shadow;" || true
      - run: pnpm --filter @nexora/database db:generate
      - run: pnpm --filter @nexora/database db:push
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  flutter:
    name: Flutter analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: "3.22.0" }
      - working-directory: apps/mobile
        run: |
          flutter pub get
          flutter analyze --no-fatal-infos

  images:
    name: Build & push images
    needs: [ts]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    strategy:
      matrix:
        target: [api, web]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: ${{ github.actor }}, password: ${{ secrets.GITHUB_TOKEN }} }
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.target }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.target }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/${{ matrix.target }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
